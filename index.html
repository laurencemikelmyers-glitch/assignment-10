      <p>Do you often initiate conversations?</p>
      <button class="btn btn-success me-2 yes">Yes</button>
      <button class="btn btn-danger no">No</button>
    </div>
    <div class="mb-3">
      <p>Do you prefer spending time alone over with others?</p>

      <button class="btn btn-danger no">No</button>
    </div>
  </div>
